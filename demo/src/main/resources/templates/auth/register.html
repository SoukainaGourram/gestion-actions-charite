<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription — CharityApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a6b3a 0%, #2d9e5f 100%); min-height: 100vh; }
        .card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .btn-success { background-color: #1a6b3a; border-color: #1a6b3a; }
        .btn-success:hover { background-color: #145530; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container" style="max-width: 480px;">
        <div class="card p-4 mt-4 mb-4">
            <div class="text-center mb-4">
                <div style="font-size:2rem;font-weight:700;color:#1a6b3a;">🌿 CharityApp</div>
                <p class="text-muted">Créer votre compte</p>
            </div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nom complet</label>
                    <input type="text" name="name" class="form-control" placeholder="Votre nom" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Téléphone</label>
                    <input type="text" name="phone" class="form-control" placeholder="06xxxxxxxx">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Rôle</label>
                    <select name="role" class="form-select">
                        <option value="USER">Donateur</option>
                        <option value="ORG_ADMIN">Administrateur d'organisation</option>
                    </select>
                </div>
                <button type="button" class="btn btn-success w-100 py-2 fw-bold" onclick="submitRegister()">
                    Créer mon compte
                </button>
            </form>
            <hr>
            <p class="text-center mb-0">
                Déjà un compte ?
                <a th:href="@{/login}" class="text-success fw-bold">Se connecter</a>
            </p>
        </div>
    </div>
    <script>
        async function submitRegister() {
            const form = document.getElementById('registerForm');
            const data = {
                name: form.name.value,
                email: form.email.value,
                phone: form.phone.value,
                password: form.password.value,
                role: form.role.value
            };
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Compte créé ! Connectez-vous.');
                window.location.href = '/login';
            } else {
                alert(await res.text());
            }
        }
    </script>
</body>
</html>
