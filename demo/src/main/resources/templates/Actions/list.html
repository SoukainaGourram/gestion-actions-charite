<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Actions — CharityApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { background: linear-gradient(180deg, #1a6b3a 0%, #145530 100%); min-height: 100vh; width: 240px; }
        .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 10px 20px; display: block; border-radius: 8px; margin: 2px 8px; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); color: white; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; color: white; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .main-content { flex: 1; background: #f8f9fa; }
        .action-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.2s; }
        .action-card:hover { transform: translateY(-3px); }
        .filter-btn { border-radius: 20px; padding: 5px 16px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar d-flex flex-column">
        <div class="brand">🌿 CharityApp</div>
        <nav class="mt-3 flex-grow-1">
            <a th:href="@{/dashboard}"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a th:href="@{/actions}" class="active"><i class="bi bi-heart me-2"></i>Actions</a>
            <a th:href="@{/organisations}"><i class="bi bi-building me-2"></i>Organisations</a>
            <a th:href="@{/profile}"><i class="bi bi-person me-2"></i>Mon Profil</a>
        </nav>
        <div class="p-3">
            <a th:href="@{/logout}" class="text-white-50"><i class="bi bi-box-arrow-left me-2"></i>Déconnexion</a>
        </div>
    </div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Actions caritatives</h4>
            <div sec:authorize="hasAnyRole('ORG_ADMIN','SUPER_ADMIN')">
                <a th:href="@{/actions/new}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i> Nouvelle action
                </a>
            </div>
        </div>

        <!-- Filtres -->
        <div class="mb-4">
            <a th:href="@{/actions}" class="btn filter-btn me-2"
               th:classappend="${selectedCategory == null} ? 'btn-success' : 'btn-outline-success'">Toutes</a>
            <a th:href="@{/actions(category='education')}" class="btn filter-btn me-2"
               th:classappend="${selectedCategory == 'education'} ? 'btn-success' : 'btn-outline-success'">📚 Éducation</a>
            <a th:href="@{/actions(category='sante')}" class="btn filter-btn me-2"
               th:classappend="${selectedCategory == 'sante'} ? 'btn-success' : 'btn-outline-success'">🏥 Santé</a>
            <a th:href="@{/actions(category='environnement')}" class="btn filter-btn me-2"
               th:classappend="${selectedCategory == 'environnement'} ? 'btn-success' : 'btn-outline-success'">🌿 Environnement</a>
            <a th:href="@{/actions(category='alimentaire')}" class="btn filter-btn"
               th:classappend="${selectedCategory == 'alimentaire'} ? 'btn-success' : 'btn-outline-success'">🍞 Alimentaire</a>
        </div>

        <!-- Liste -->
        <div class="row g-3">
            <div class="col-md-6 col-lg-4" th:each="action : ${actions}">
                <div class="card action-card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge bg-success bg-opacity-10 text-success"
                                  th:text="${action.category != null ? action.category : 'Général'}"></span>
                            <span class="badge"
                                  th:classappend="${action.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${action.status}"></span>
                        </div>
                        <h6 class="fw-bold" th:text="${action.title}"></h6>
                        <p class="text-muted small" th:text="${#strings.abbreviate(action.description, 80)}"></p>
                        <div class="mb-2">
                            <div class="d-flex justify-content-between small mb-1">
                                <span class="text-muted">Collecté</span>
                                <span class="fw-bold text-success"
                                      th:text="${action.currentAmount} + ' / ' + ${action.goalAmount} + ' MAD'"></span>
                            </div>
                            <div class="progress" style="height:6px;">
                                <div class="progress-bar bg-success"
                                     th:style="'width:' + ${action.progressPercentage} + '%'"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <small class="text-muted"><i class="bi bi-geo-alt"></i> <span th:text="${action.location}"></span></small>
                            <a th:href="@{/actions/{id}(id=${action.id})}" class="btn btn-sm btn-outline-success">
                                Voir <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(actions)}" class="text-center py-5 text-muted">
            <i class="bi bi-inbox fs-1"></i>
            <p class="mt-2">Aucune action trouvée</p>
        </div>
    </div>
</div>
</body>
</html>
