<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${action.title} + ' — CharityApp'">Action</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { background: linear-gradient(180deg, #1a6b3a 0%, #145530 100%); min-height: 100vh; width: 240px; }
        .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 10px 20px; display: block; border-radius: 8px; margin: 2px 8px; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); color: white; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; color: white; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .main-content { flex: 1; background: #f8f9fa; }
        .progress { height: 12px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar d-flex flex-column">
        <div class="brand">🌿 CharityApp</div>
        <nav class="mt-3 flex-grow-1">
            <a th:href="@{/dashboard}"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a th:href="@{/actions}" class="active"><i class="bi bi-heart me-2"></i>Actions</a>
            <a th:href="@{/organisations}"><i class="bi bi-building me-2"></i>Organisations</a>
            <a th:href="@{/profile}"><i class="bi bi-person me-2"></i>Mon Profil</a>
        </nav>
        <div class="p-3">
            <a th:href="@{/logout}" class="text-white-50"><i class="bi bi-box-arrow-left me-2"></i>Déconnexion</a>
        </div>
    </div>

    <div class="main-content p-4">
        <a th:href="@{/actions}" class="btn btn-outline-secondary btn-sm mb-3">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-3 p-4">
                    <div class="d-flex gap-2 mb-3">
                        <span class="badge bg-success bg-opacity-10 text-success fs-6"
                              th:text="${action.category != null ? action.category : 'Général'}"></span>
                        <span class="badge fs-6"
                              th:classappend="${action.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                              th:text="${action.status}"></span>
                    </div>
                    <h3 class="fw-bold" th:text="${action.title}"></h3>
                    <p class="text-muted" th:text="${action.description}"></p>
                    <div class="row g-3 mt-2">
                        <div class="col-sm-6">
                            <i class="bi bi-geo-alt-fill text-success"></i>
                            <span th:text="${action.location}"></span>
                        </div>
                        <div class="col-sm-6" th:if="${action.startDate != null}">
                            <i class="bi bi-calendar-fill text-success"></i>
                            <span th:text="${action.startDate} + ' → ' + ${action.endDate}"></span>
                        </div>
                        <div class="col-sm-6" th:if="${action.organisation != null}">
                            <i class="bi bi-building-fill text-success"></i>
                            <span th:text="${action.organisation.name}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-3 p-4 mb-3">
                    <h6 class="fw-bold mb-3">💰 Collecte de fonds</h6>
                    <div class="text-center mb-3">
                        <span class="display-6 fw-bold text-success" th:text="${action.currentAmount} + ' MAD'"></span>
                        <div class="text-muted small" th:text="'sur ' + ${action.goalAmount} + ' MAD'"></div>
                    </div>
                    <div class="progress mb-2">
                        <div class="progress-bar bg-success"
                             th:style="'width:' + ${action.progressPercentage} + '%'"
                             th:text="${#numbers.formatDecimal(action.progressPercentage, 1, 1)} + '%'"></div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-3 p-4" sec:authorize="hasRole('USER')">
                    <h6 class="fw-bold mb-3">🤝 Faire un don</h6>
                    <div class="mb-3">
                        <label class="form-label">Montant (MAD)</label>
                        <input type="number" id="donationAmount" class="form-control" placeholder="100" min="1">
                    </div>
                    <button class="btn btn-success w-100" onclick="makeDonation()">
                        <i class="bi bi-heart me-2"></i>Donner maintenant
                    </button>
                </div>

                <div class="mt-3" sec:authorize="hasAnyRole('ORG_ADMIN','SUPER_ADMIN')">
                    <a th:href="@{/actions/edit/{id}(id=${action.id})}" class="btn btn-outline-warning w-100 mb-2">
                        <i class="bi bi-pencil me-2"></i>Modifier
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">
async function makeDonation() {
    const amount = document.getElementById('donationAmount').value;
    if (!amount || amount <= 0) { alert('Entrez un montant valide'); return; }
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId');
    const actionId = /*[[${action.id}]]*/ 0;
    const res = await fetch('/api/donations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
            amount: parseFloat(amount),
            user: { id: userId },
            action: { id: actionId }
        })
    });
    if (res.ok) { alert('Don effectue ! Merci'); location.reload(); }
    else { alert('Erreur lors du don'); }
}
</script>
</body>
</html>
