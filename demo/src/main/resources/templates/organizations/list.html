<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Organisations — CharityApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { background: linear-gradient(180deg, #1a6b3a 0%, #145530 100%); min-height: 100vh; width: 240px; }
        .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 10px 20px; display: block; border-radius: 8px; margin: 2px 8px; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); color: white; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; color: white; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .main-content { flex: 1; background: #f8f9fa; }
        .org-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.2s; }
        .org-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar d-flex flex-column">
        <div class="brand">🌿 CharityApp</div>
        <nav class="mt-3 flex-grow-1">
            <a th:href="@{/dashboard}"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a th:href="@{/actions}"><i class="bi bi-heart me-2"></i>Actions</a>
            <a th:href="@{/organisations}" class="active"><i class="bi bi-building me-2"></i>Organisations</a>
            <a th:href="@{/profile}"><i class="bi bi-person me-2"></i>Mon Profil</a>
        </nav>
        <div class="p-3">
            <a th:href="@{/logout}" class="text-white-50"><i class="bi bi-box-arrow-left me-2"></i>Déconnexion</a>
        </div>
    </div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Organisations</h4>
            <a th:href="@{/organisations/new}" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i> Nouvelle organisation
            </a>
        </div>
        <div class="row g-3">
            <div class="col-md-6 col-lg-4" th:each="org : ${organisations}">
                <div class="card org-card h-100 p-3">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="fw-bold mb-0" th:text="${org.name}"></h6>
                        <span class="badge"
                              th:classappend="${org.approved} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${org.approved} ? 'Approuvée' : 'En attente'"></span>
                    </div>
                    <p class="text-muted small"
                       th:text="${org.description != null ? #strings.abbreviate(org.description, 80) : 'Aucune description'}"></p>
                    <div class="text-muted small mb-1"><i class="bi bi-geo-alt"></i> <span th:text="${org.address}"></span></div>
                    <div class="text-muted small mb-3"><i class="bi bi-telephone"></i> <span th:text="${org.contact}"></span></div>
                    <div class="d-flex gap-2 mt-auto">
                        <a th:href="@{/organisations/{id}(id=${org.id})}" class="btn btn-sm btn-outline-success flex-grow-1">
                            Voir <i class="bi bi-arrow-right"></i>
                        </a>
                        <button th:if="${!org.approved}" sec:authorize="hasRole('SUPER_ADMIN')"
                                class="btn btn-sm btn-success"
                                th:onclick="'approuver(' + ${org.id} + ')'">
                            <i class="bi bi-check-circle"></i> Approuver
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(organisations)}" class="text-center py-5 text-muted">
            <i class="bi bi-inbox fs-1"></i>
            <p class="mt-2">Aucune organisation pour le moment</p>
        </div>
    </div>
</div>
<script>
async function approuver(id) {
    const token = localStorage.getItem('token');
    const res = await fetch('/api/organisations/' + id + '/approve', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) { alert('Organisation approuvée !'); location.reload(); }
    else { alert('Erreur'); }
}
</script>
</body>
</html>
