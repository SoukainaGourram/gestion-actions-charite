<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil — CharityApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { background: linear-gradient(180deg, #1a6b3a 0%, #145530 100%); min-height: 100vh; width: 240px; }
        .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 10px 20px; display: block; border-radius: 8px; margin: 2px 8px; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); color: white; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; color: white; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .main-content { flex: 1; background: #f8f9fa; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #1a6b3a; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar d-flex flex-column">
        <div class="brand">🌿 CharityApp</div>
        <nav class="mt-3 flex-grow-1">
            <a th:href="@{/dashboard}"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a th:href="@{/actions}"><i class="bi bi-heart me-2"></i>Actions</a>
            <a th:href="@{/organisations}"><i class="bi bi-building me-2"></i>Organisations</a>
            <a th:href="@{/profile}" class="active"><i class="bi bi-person me-2"></i>Mon Profil</a>
        </nav>
        <div class="p-3">
            <a th:href="@{/logout}" class="text-white-50"><i class="bi bi-box-arrow-left me-2"></i>Déconnexion</a>
        </div>
    </div>

    <div class="main-content p-4">
        <h4 class="fw-bold mb-4">Mon Profil</h4>
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-3 p-4 text-center">
                    <div class="avatar mx-auto mb-3">
                        <span th:text="${#strings.substring(user.name, 0, 1)}">S</span>
                    </div>
                    <h5 class="fw-bold" th:text="${user.name}"></h5>
                    <p class="text-muted" th:text="${user.email}"></p>
                    <span class="badge bg-success" th:text="${user.role}"></span>
                    <div class="mt-3 text-muted small">
                        <i class="bi bi-calendar"></i> Inscrit le <span th:text="${user.registrationDate}"></span>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-3 p-4 mb-4">
                    <h6 class="fw-bold mb-3">Modifier mes informations</h6>
                    <div class="mb-3">
                        <label class="form-label">Nom complet</label>
                        <input type="text" id="name" class="form-control" th:value="${user.name}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Téléphone</label>
                        <input type="text" id="phone" class="form-control" th:value="${user.phone}">
                    </div>
                    <button class="btn btn-success" onclick="updateProfile()">
                        <i class="bi bi-check-circle me-2"></i>Enregistrer
                    </button>
                </div>

                <div class="card border-0 shadow-sm rounded-3 p-4">
                    <h6 class="fw-bold mb-3">Historique de mes dons</h6>
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Action</th>
                                <th>Montant</th>
                                <th>Date</th>
                                <th>Statut</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="don : ${donations}">
                                <td th:text="${don.action != null ? don.action.title : 'N/A'}"></td>
                                <td class="fw-bold text-success" th:text="${don.amount} + ' MAD'"></td>
                                <td th:text="${don.donationDate}"></td>
                                <td><span class="badge bg-success" th:text="${don.status}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(donations)}" class="text-center py-3 text-muted">
                        <i class="bi bi-inbox"></i> Aucun don effectué
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
async function updateProfile() {
    const token = localStorage.getItem('token');
    const res = await fetch('/api/user/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value
        })
    });
    if (res.ok) { alert('Profil mis à jour !'); location.reload(); }
    else { alert('Erreur lors de la mise à jour'); }
}
</script>
</body>
</html>
