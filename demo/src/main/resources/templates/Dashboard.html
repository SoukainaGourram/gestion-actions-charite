<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — CharityApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { background: linear-gradient(180deg, #1a6b3a 0%, #145530 100%); min-height: 100vh; width: 240px; }
        .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 10px 20px; display: block; border-radius: 8px; margin: 2px 8px; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); color: white; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; color: white; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .stat-card { border-radius: 12px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .main-content { flex: 1; background: #f8f9fa; }
        .action-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.2s; }
        .action-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="brand">🌿 CharityApp</div>
        <nav class="mt-3 flex-grow-1">
            <a th:href="@{/dashboard}" class="active"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a th:href="@{/actions}"><i class="bi bi-heart me-2"></i>Actions</a>
            <a th:href="@{/organisations}"><i class="bi bi-building me-2"></i>Organisations</a>
            <a th:href="@{/profile}"><i class="bi bi-person me-2"></i>Mon Profil</a>
            <div sec:authorize="hasRole('SUPER_ADMIN')" class="mt-2">
                <div style="color:rgba(255,255,255,0.5);font-size:0.75rem;padding:8px 20px;">ADMIN</div>
                <a th:href="@{/admin/users}"><i class="bi bi-people me-2"></i>Utilisateurs</a>
            </div>
        </nav>
        <div class="p-3 border-top" style="border-color:rgba(255,255,255,0.2)!important;">
            <a th:href="@{/logout}" class="text-white-50"><i class="bi bi-box-arrow-left me-2"></i>Déconnexion</a>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0">Tableau de bord</h4>
                <small class="text-muted">Bienvenue sur CharityApp</small>
            </div>
            <div sec:authorize="hasAnyRole('ORG_ADMIN','SUPER_ADMIN')">
                <a th:href="@{/actions/new}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i> Nouvelle action
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle bg-success bg-opacity-10 p-3 me-3">
                            <i class="bi bi-heart-fill text-success fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Total Actions</div>
                            <div class="fw-bold fs-4" th:text="${totalActions}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                            <i class="bi bi-building text-primary fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Organisations</div>
                            <div class="fw-bold fs-4" th:text="${totalOrgs}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-3">
                            <i class="bi bi-cash-stack text-warning fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Total Dons</div>
                            <div class="fw-bold fs-4" th:text="${totalDons}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions récentes -->
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-header bg-white border-0 pt-3">
                <h6 class="fw-bold mb-0">Actions récentes</h6>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6 col-lg-4" th:each="action : ${actions}">
                        <div class="card action-card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <span class="badge bg-success bg-opacity-10 text-success"
                                          th:text="${action.category != null ? action.category : 'Général'}"></span>
                                    <span class="badge"
                                          th:classappend="${action.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${action.status}"></span>
                                </div>
                                <h6 class="fw-bold" th:text="${action.title}"></h6>
                                <p class="text-muted small" th:text="${#strings.abbreviate(action.description, 80)}"></p>
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between small text-muted mb-1">
                                        <span>Progression</span>
                                        <span th:text="${#numbers.formatDecimal(action.progressPercentage, 1, 1)} + '%'">0%</span>
                                    </div>
                                    <div class="progress" style="height:6px;">
                                        <div class="progress-bar bg-success"
                                             th:style="'width:' + ${action.progressPercentage} + '%'"></div>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <small class="text-muted"><i class="bi bi-geo-alt"></i> <span th:text="${action.location}"></span></small>
                                    <a th:href="@{/actions/{id}(id=${action.id})}" class="btn btn-sm btn-outline-success">
                                        Voir <i class="bi bi-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(actions)}" class="text-center py-4 text-muted">
                    <i class="bi bi-inbox fs-1"></i>
                    <p class="mt-2">Aucune action pour le moment</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
